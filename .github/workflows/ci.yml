name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*'
              - '!**/*.md'
              - '!docs/**'
            docs:
              - '**/*.md'
              - 'docs/**'

  validate-wrapper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

  docs:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v5
      - name: Verify docs sync
        run: ./scripts/verify-docs-sync.sh

  android:
    runs-on: ubuntu-latest
    needs: [changes, validate-wrapper]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build toolkit + demo (Android)
        run: ./gradlew :toolkit:assemble :toolkit:testAndroidHostTest :toolkit:lint :composeApp:lintDebug :composeApp:assembleDebug -Pkotlin.native.ignoreDisabledTargets=true

  ios:
    runs-on: macos-latest
    needs: [changes, validate-wrapper]
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - name: Build toolkit + demo (iOS)
        run: ./gradlew :toolkit:compileKotlinIosArm64 :toolkit:compileKotlinIosX64 :toolkit:compileKotlinIosSimulatorArm64 :composeApp:compileKotlinIosSimulatorArm64
