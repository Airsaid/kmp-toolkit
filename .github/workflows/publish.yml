name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (overrides VERSION_NAME)"
        required: false
        default: ""

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
            version="${tag#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(grep -E '^VERSION_NAME=' gradle.properties | head -n1 | cut -d= -f2)
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release docs
        if: github.event_name == 'release'
        run: ./scripts/verify-release.sh "${{ steps.version.outputs.version }}"

      - name: Generate release notes
        if: github.event_name == 'release'
        run: ./scripts/extract-changelog.sh "${{ steps.version.outputs.version }}" > release-notes.md

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            echo "Publishing version: ${{ steps.version.outputs.version }}"
            ./gradlew :toolkit:publishAllPublicationsToMavenCentralRepository -PVERSION_NAME="${{ steps.version.outputs.version }}"
          else
            ./gradlew :toolkit:publishAllPublicationsToMavenCentralRepository
          fi

      - name: Sync GitHub Release notes
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          body_path: release-notes.md
